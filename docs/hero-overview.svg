<svg xmlns="http://www.w3.org/2000/svg" width="980" height="640" viewBox="0 0 980 640" role="img" aria-label="One hop runtime, three surfaces: a browser window, an MCP agent panel, and a CLI window all attached to the same live terminal session named claude. A legend explains web sharing, MCP-native agent control, and the CLI client.">
  <defs>
    <linearGradient id="canvas" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16171c"/>
      <stop offset="1" stop-color="#101116"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <clipPath id="winBrowser"><rect x="40" y="78" width="460" height="296" rx="10"/></clipPath>
    <clipPath id="winMcp"><rect x="540" y="78" width="400" height="186" rx="10"/></clipPath>
    <clipPath id="winCli"><rect x="540" y="292" width="400" height="182" rx="10"/></clipPath>
  </defs>

  <!-- canvas -->
  <rect x="0.5" y="0.5" width="979" height="639" rx="18" fill="url(#canvas)" stroke="#272831"/>

  <!-- kicker -->
  <text x="490" y="44" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12.5" letter-spacing="0.14em" fill="#8d909b">ONE RUNTIME — THE SAME LIVE SESSION IN THE BROWSER, THE TERMINAL, AND UNDER AGENT CONTROL</text>

  <!-- ═══════════ ① browser window (web client, light theme) ═══════════ -->
  <g filter="url(#shadow)">
    <rect x="40" y="78" width="460" height="296" rx="10" fill="#ffffff" stroke="#d4d5db"/>
  </g>
  <g clip-path="url(#winBrowser)" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11.5">
    <!-- browser chrome -->
    <rect x="40" y="78" width="460" height="30" fill="#e9eaef"/>
    <circle cx="60" cy="93" r="5" fill="#ff5f57"/>
    <circle cx="76" cy="93" r="5" fill="#febc2e"/>
    <circle cx="92" cy="93" r="5" fill="#28c840"/>
    <rect x="130" y="85" width="300" height="16" rx="8" fill="#ffffff" stroke="#d4d5db"/>
    <text x="280" y="96.5" text-anchor="middle" fill="#6e6e73" font-size="10">https://hop.example.com/s/claude/</text>
    <!-- web topbar -->
    <rect x="40" y="108" width="460" height="32" fill="#f2f2f7"/>
    <rect x="54" y="115" width="18" height="18" rx="5" fill="#7c3aed"/>
    <text x="63" y="128" text-anchor="middle" font-size="10">🐰</text>
    <text x="80" y="127.5" fill="#1d1d1f" font-weight="700" font-size="11">Hay</text>
    <rect x="306" y="113" width="84" height="22" rx="11" fill="#ffffff" stroke="#dcdce3"/>
    <text x="318" y="127.5" font-size="10"><tspan fill="#1a7f37">●</tspan><tspan fill="#1d1d1f" font-weight="600"> alice</tspan></text>
    <rect x="396" y="113" width="92" height="22" rx="11" fill="#ffffff" stroke="#7c3aed"/>
    <text x="406" y="127.5" font-size="10"><tspan fill="#7c3aed">●</tspan><tspan fill="#1d1d1f" font-weight="600"> claude</tspan><tspan fill="#6e6e73"> ai</tspan></text>
    <!-- terminal body -->
    <text x="58" y="166"><tspan fill="#6e6e73">$</tspan><tspan fill="#1d1d1f"> npm test</tspan></text>
    <text x="58" y="188"><tspan fill="#1a7f37">✓</tspan><tspan fill="#1d1d1f"> 20 tests passed</tspan><tspan fill="#6e6e73"> (1.2s)</tspan></text>
    <text x="58" y="218"><tspan fill="#6e6e73">$</tspan><tspan fill="#1d1d1f"> claude</tspan></text>
    <text x="58" y="240"><tspan fill="#7c3aed">✻</tspan><tspan fill="#1d1d1f"> Refactoring rooms.ts…</tspan></text>
    <text x="58" y="262" fill="#6e6e73">  ⎿ Updated packages/shared/protocol.ts</text>
    <text x="58" y="292"><tspan fill="#6e6e73">&gt;</tspan></text>
    <rect x="72" y="281" width="7" height="13" fill="#7c3aed" opacity="0.85"/>
    <!-- web status bar -->
    <rect x="40" y="344" width="460" height="30" fill="#e9e9ed"/>
    <rect x="48" y="349" width="62" height="20" rx="5" fill="#7c3aed"/>
    <text x="79" y="363" text-anchor="middle" fill="#ffffff" font-weight="700" font-size="10.5">claude</text>
    <text x="118" y="363" fill="#6e6e73" font-size="10.5">~/code/hop2</text>
    <text x="492" y="363" text-anchor="end" font-size="10.5"><tspan fill="#6e6e73">⌘F find · 2 viewers </tspan><tspan fill="#1a7f37">●</tspan></text>
  </g>

  <!-- ═══════════ ② MCP agent panel ═══════════ -->
  <g filter="url(#shadow)">
    <rect x="540" y="78" width="400" height="186" rx="10" fill="#111116" stroke="#2c2c31"/>
  </g>
  <g clip-path="url(#winMcp)" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11">
    <rect x="540" y="78" width="400" height="28" fill="#1a1a1f"/>
    <text x="556" y="96.5" fill="#93939b" font-size="10.5">Claude Code — MCP client</text>
    <rect x="848" y="84" width="78" height="17" rx="8.5" fill="none" stroke="#a78bfa"/>
    <text x="887" y="96" text-anchor="middle" fill="#a78bfa" font-size="9.5">hop-mcp</text>
    <text x="556" y="126"><tspan fill="#e6e6e9">▸ hop_create_terminal</tspan><tspan fill="#93939b"> { name: "claude" }</tspan></text>
    <text x="556" y="144"><tspan fill="#3fb950">  ✓</tspan><tspan fill="#93939b"> { id: "t_4f21", sessionName: "claude" }</tspan></text>
    <text x="556" y="172"><tspan fill="#e6e6e9">▸ hopx_exec</tspan><tspan fill="#93939b"> { command: "npm test" }</tspan></text>
    <text x="556" y="190"><tspan fill="#3fb950">  ✓</tspan><tspan fill="#93939b"> exit_code 0 · "20 tests passed"</tspan></text>
    <text x="556" y="218"><tspan fill="#e6e6e9">▸ hop_wait_terminal</tspan><tspan fill="#93939b"> { until_agent_done: true }</tspan></text>
    <text x="556" y="236"><tspan fill="#d29922">  ⧗</tspan><tspan fill="#93939b"> waiting — agent turn in progress…</tspan></text>
  </g>

  <!-- ═══════════ ③ CLI window (dark theme) ═══════════ -->
  <g filter="url(#shadow)">
    <rect x="540" y="292" width="400" height="182" rx="10" fill="#17181d" stroke="#2e3038"/>
  </g>
  <g clip-path="url(#winCli)" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11">
    <rect x="540" y="292" width="400" height="26" fill="#1f2026"/>
    <circle cx="558" cy="305" r="4.5" fill="#ff5f57"/>
    <circle cx="573" cy="305" r="4.5" fill="#febc2e"/>
    <circle cx="588" cy="305" r="4.5" fill="#28c840"/>
    <text x="740" y="309" text-anchor="middle" fill="#8d909b" font-size="10" font-family="-apple-system, 'Segoe UI', sans-serif">hop attach claude</text>
    <text x="556" y="342"><tspan fill="#3fb950">●</tspan><tspan fill="#93939b"> Attached to 'claude' (3 participants)</tspan></text>
    <text x="556" y="368"><tspan fill="#93939b">&gt;</tspan></text>
    <rect x="570" y="357" width="7" height="13" fill="#a78bfa" opacity="0.85"/>
    <!-- status bar -->
    <rect x="540" y="408" width="400" height="22" fill="#2a2a2e"/>
    <rect x="540" y="408" width="58" height="22" fill="#a78bfa"/>
    <text x="569" y="423" text-anchor="middle" fill="#1d1d1f" font-weight="700" font-size="10.5">claude</text>
    <text x="606" y="423" fill="#93939b" font-size="10.5">~/code/hop2</text>
    <text x="930" y="423" text-anchor="end" font-size="10.5"><tspan fill="#93939b">peers: alice, claude* · </tspan><tspan fill="#3fb950">●</tspan></text>
    <!-- hint bar -->
    <rect x="540" y="430" width="400" height="22" fill="#232327"/>
    <text x="552" y="445" font-size="10.5"><tspan fill="#e6e6e9">⌃G </tspan><tspan fill="#93939b">detach · </tspan><tspan fill="#e6e6e9">⌥F </tspan><tspan fill="#93939b">find · </tspan><tspan fill="#e6e6e9">⌥C </tspan><tspan fill="#93939b">control · </tspan><tspan fill="#e6e6e9">⌥0 </tspan><tspan fill="#93939b">live</tspan></text>
  </g>

  <!-- numbered badges -->
  <g font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="bold" text-anchor="middle">
    <circle cx="40" cy="94" r="9" fill="#8b6ef0"/><text x="40" y="98" fill="#ffffff">1</text>
    <circle cx="540" cy="94" r="9" fill="#8b6ef0"/><text x="540" y="98" fill="#ffffff">2</text>
    <circle cx="540" cy="308" r="9" fill="#8b6ef0"/><text x="540" y="312" fill="#ffffff">3</text>
  </g>

  <!-- legend -->
  <g font-family="-apple-system, 'Segoe UI', sans-serif">
    <g font-size="11" font-weight="bold" text-anchor="middle" fill="#ffffff">
      <circle cx="60" cy="516" r="8" fill="#8b6ef0"/><text x="60" y="520">1</text>
      <circle cx="60" cy="556" r="8" fill="#8b6ef0"/><text x="60" y="560">2</text>
      <circle cx="60" cy="596" r="8" fill="#8b6ef0"/><text x="60" y="600">3</text>
    </g>
    <g font-size="13.5" fill="#e8e9ee">
      <text x="78" y="521"><tspan font-weight="600">Share in the browser</tspan><tspan fill="#9a9da8"> — tunneled anywhere, with presence, typing markers, and take/release control.</tspan></text>
      <text x="78" y="561"><tspan font-weight="600">MCP-native agents</tspan><tspan fill="#9a9da8"> — Claude Code, Codex &amp; friends create, drive, and read the same sessions.</tspan></text>
      <text x="78" y="601"><tspan font-weight="600">Attach from any terminal</tspan><tspan fill="#9a9da8"> — detach freely; sessions persist on the hop runtime.</tspan></text>
    </g>
  </g>
</svg>
