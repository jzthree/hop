<svg xmlns="http://www.w3.org/2000/svg" width="980" height="600" viewBox="0 0 980 600" role="img" aria-label="Annotated screenshot of the hop terminal: a dark-themed terminal window with a session chip, live state dot, scroll indicator and keycap hints, next to a light-themed window showing adaptive themes and scrollback search; a legend explains each numbered feature.">
  <defs>
    <linearGradient id="canvas" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16171c"/>
      <stop offset="1" stop-color="#101116"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <clipPath id="winDark"><rect x="48" y="48" width="580" height="300" rx="10"/></clipPath>
    <clipPath id="winLight"><rect x="664" y="96" width="276" height="136" rx="8"/></clipPath>
  </defs>

  <!-- canvas -->
  <rect x="0.5" y="0.5" width="979" height="599" rx="18" fill="url(#canvas)" stroke="#272831"/>

  <!-- ======================= dark terminal window ======================= -->
  <g filter="url(#shadow)">
    <rect x="48" y="48" width="580" height="300" rx="10" fill="#17181d" stroke="#2e3038"/>
  </g>
  <g clip-path="url(#winDark)" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
    <!-- chrome -->
    <rect x="48" y="48" width="580" height="32" fill="#1f2026"/>
    <circle cx="70" cy="64" r="5.5" fill="#ff5f57"/>
    <circle cx="88" cy="64" r="5.5" fill="#febc2e"/>
    <circle cx="106" cy="64" r="5.5" fill="#28c840"/>
    <text x="338" y="68.5" text-anchor="middle" fill="#8d909b" font-size="12" font-family="-apple-system, 'Segoe UI', sans-serif">hop attach claude — dark</text>

    <!-- body -->
    <text x="64" y="106"><tspan fill="#93939b">$</tspan><tspan fill="#e6e6e9"> hop attach claude</tspan></text>
    <text x="64" y="128"><tspan fill="#3fb950">●</tspan><tspan fill="#93939b"> Attached to 'claude' (2 participants)</tspan></text>
    <text x="64" y="172"><tspan fill="#a78bfa">✻</tspan><tspan fill="#e6e6e9"> Refactoring rooms.ts…</tspan></text>
    <text x="64" y="194" fill="#93939b">  ⎿ Updated packages/shared/protocol.ts</text>
    <text x="64" y="216" fill="#93939b">  ⎿ Ran vitest — 20 tests passed</text>
    <text x="64" y="260"><tspan fill="#3fb950">✓</tspan><tspan fill="#e6e6e9"> Done. Anything else?</tspan></text>
    <text x="64" y="282"><tspan fill="#93939b">&gt;</tspan><tspan fill="#e6e6e9"> </tspan></text>
    <rect x="80" y="271" width="8" height="14" fill="#a78bfa" opacity="0.85"/>

    <!-- status bar -->
    <rect x="48" y="300" width="580" height="24" fill="#2a2a2e"/>
    <rect x="48" y="300" width="66" height="24" fill="#a78bfa"/>
    <text x="81" y="316.5" text-anchor="middle" fill="#1d1d1f" font-weight="bold">claude</text>
    <text x="122" y="316.5" fill="#93939b">~/code/hop2</text>
    <text x="612" y="316.5" text-anchor="end"><tspan fill="#e6e6e9">scroll 142/520 · ⌥0 live</tspan><tspan fill="#93939b"> · peers: alice* · </tspan><tspan fill="#3fb950">●</tspan></text>

    <!-- hint bar -->
    <rect x="48" y="324" width="580" height="24" fill="#232327"/>
    <text x="60" y="340.5"><tspan fill="#e6e6e9">⌃G </tspan><tspan fill="#93939b">detach · </tspan><tspan fill="#e6e6e9">⌃Q </tspan><tspan fill="#93939b">kill · </tspan><tspan fill="#e6e6e9">⌥←→↑↓ </tspan><tspan fill="#93939b">pan · </tspan><tspan fill="#e6e6e9">⌥0 </tspan><tspan fill="#93939b">live · </tspan><tspan fill="#e6e6e9">⌥F </tspan><tspan fill="#93939b">find · </tspan><tspan fill="#e6e6e9">⌥C </tspan><tspan fill="#93939b">control</tspan></text>
  </g>

  <!-- ======================= light terminal window ======================= -->
  <g filter="url(#shadow)">
    <rect x="664" y="96" width="276" height="136" rx="8" fill="#ffffff" stroke="#d4d5db"/>
  </g>
  <g clip-path="url(#winLight)" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11">
    <rect x="664" y="96" width="276" height="26" fill="#e9eaef"/>
    <circle cx="681" cy="109" r="4.5" fill="#ff5f57"/>
    <circle cx="696" cy="109" r="4.5" fill="#febc2e"/>
    <circle cx="711" cy="109" r="4.5" fill="#28c840"/>
    <text x="812" y="113" text-anchor="middle" fill="#7a7d88" font-size="10.5" font-family="-apple-system, 'Segoe UI', sans-serif">hop — light</text>

    <text x="676" y="140"><tspan fill="#6e6e73">$</tspan><tspan fill="#1d1d1f"> npm run build</tspan></text>
    <text x="676" y="158"><tspan fill="#1a7f37">✓</tspan><tspan fill="#1d1d1f"> built in 0.6s</tspan></text>

    <!-- status bar -->
    <rect x="664" y="166" width="276" height="22" fill="#e9e9ed"/>
    <rect x="664" y="166" width="48" height="22" fill="#7c3aed"/>
    <text x="688" y="181" text-anchor="middle" fill="#ffffff" font-weight="bold">build</text>
    <text x="718" y="181" fill="#6e6e73">~/code</text>
    <text x="928" y="181" text-anchor="end"><tspan fill="#b45309">reconnecting · ●</tspan></text>

    <!-- hint bar : search -->
    <rect x="664" y="188" width="276" height="22" fill="#f2f2f7"/>
    <text x="676" y="203"><tspan fill="#7c3aed">/error</tspan><tspan fill="#1d1d1f">  3/17</tspan><tspan fill="#6e6e73"> · ↓ next · ↑ prev · Esc</tspan></text>

    <!-- toast strip -->
    <rect x="664" y="210" width="276" height="22" fill="#f2f2f7"/>
    <text x="676" y="225"><tspan fill="#1a7f37">✓ </tspan><tspan fill="#1d1d1f">Sent 12 line(s) to clipboard</tspan></text>
  </g>

  <!-- ======================= numbered badges ======================= -->
  <g font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="bold" text-anchor="middle">
    <circle cx="44" cy="312" r="9" fill="#8b6ef0"/><text x="44" y="316" fill="#ffffff">1</text>
    <circle cx="632" cy="312" r="9" fill="#8b6ef0"/><text x="632" y="316" fill="#ffffff">2</text>
    <circle cx="466" cy="296" r="9" fill="#8b6ef0"/><text x="466" y="300" fill="#ffffff">3</text>
    <circle cx="300" cy="352" r="9" fill="#8b6ef0"/><text x="300" y="356" fill="#ffffff">4</text>
    <circle cx="662" cy="109" r="9" fill="#8b6ef0"/><text x="662" y="113" fill="#ffffff">5</text>
    <circle cx="942" cy="199" r="9" fill="#8b6ef0"/><text x="942" y="203" fill="#ffffff">6</text>
  </g>

  <!-- ======================= legend ======================= -->
  <g font-family="-apple-system, 'Segoe UI', sans-serif">
    <g font-size="11" font-weight="bold" text-anchor="middle" fill="#ffffff">
      <circle cx="60" cy="416" r="8" fill="#8b6ef0"/><text x="60" y="420">1</text>
      <circle cx="60" cy="472" r="8" fill="#8b6ef0"/><text x="60" y="476">2</text>
      <circle cx="60" cy="528" r="8" fill="#8b6ef0"/><text x="60" y="532">3</text>
      <circle cx="524" cy="416" r="8" fill="#8b6ef0"/><text x="524" y="420">4</text>
      <circle cx="524" cy="472" r="8" fill="#8b6ef0"/><text x="524" y="476">5</text>
      <circle cx="524" cy="528" r="8" fill="#8b6ef0"/><text x="524" y="532">6</text>
    </g>
    <g font-size="13.5" font-weight="600" fill="#e8e9ee">
      <text x="78" y="421">Session chip</text>
      <text x="78" y="477">Live state dot</text>
      <text x="78" y="533">Scroll indicator</text>
      <text x="542" y="421">Keycap hints</text>
      <text x="542" y="477">Adaptive themes</text>
      <text x="542" y="533">Search &amp; toasts</text>
    </g>
    <g font-size="12.5" fill="#9a9da8">
      <text x="78" y="440">The room name, pinned flush-left as an accent pill.</text>
      <text x="78" y="496">Green connected · amber reconnecting · red dropped · purple locked.</text>
      <text x="78" y="552">Your place in scrollback — ⌥0 snaps back to live output.</text>
      <text x="542" y="440">Keys bright, labels dim; ⌃G detach / ⌃Q kill never truncate away.</text>
      <text x="542" y="496">Light/dark detected from your terminal (OSC 11), or --theme.</text>
      <text x="542" y="552">⌥F search with live match counts; ✓ / ! toasts for feedback.</text>
    </g>
  </g>
</svg>
