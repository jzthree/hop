<!-- iOS Virtual Keyboard for Hop Terminal - Matching termkey-ios styling -->
<!-- Uses window.__hopSocket from the head hook -->
<style id="hop-keyboard-styles">
    /* Suppress native keyboard */
    html,
    body {
        -webkit-user-select: none;
        user-select: none;
        background: #d1d3d9;
    }

    .xterm-helper-textarea {
        opacity: 0 !important;
        pointer-events: none !important;
    }

    /* Keyboard container - Light mode iOS keyboard background */
    #hop-keyboard {
        /* Positioning via flexbox - no fixed positioning */
        background: #d1d3d9;
        padding: 4px max(2px, env(safe-area-inset-right)) 0 max(2px, env(safe-area-inset-left));
        padding-bottom: max(10px, env(safe-area-inset-bottom));
        font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
        box-sizing: border-box;
        overflow-x: hidden;
    }

    #hop-keyboard .acc-row {
        display: flex;
        margin: 0 2px var(--hop-acc-margin-bottom);
        padding: var(--hop-acc-pad) var(--hop-acc-pad) var(--hop-acc-pad-bottom);
        background: #d1d3d9;
        border-radius: 8px;
    }

    #hop-keys {
        display: flex;
        flex-direction: column;
        gap: var(--hop-row-gap);
        padding: 0 4px;
        width: 100%;
        box-sizing: border-box;
    }

    #hop-keyboard .key-row {
        display: flex;
        justify-content: center;
        width: 100%;
        box-sizing: border-box;
    }

    #hop-keyboard .key-row.r2 {
        padding: 0 5%;
    }

    /* Third row - align z-m with s-k (SHIFT/BKSP have larger gaps) */
    #hop-keyboard .key-row.r3 {
        padding: 0 1.5%;
    }

    #hop-keyboard .key-row.r3 .gap {
        width: 1%;
        flex-shrink: 0;
    }

    /* Base key - iOS exact styling (light mode) */
    #hop-keyboard .key {
        display: flex;
        align-items: center;
        justify-content: center;
        height: var(--hop-key-height);
        border-radius: 20px;
        margin: var(--hop-key-margin);
        font-size: var(--hop-key-font);
        font-weight: 400;
        letter-spacing: -0.5px;
        position: relative;

        /* Light mode character key */
        background: #ffffff;
        color: #000;

        cursor: pointer;
        flex-grow: 1;
        flex-basis: 0;
        -webkit-tap-highlight-color: transparent;
        transition: background-color 1s ease-out, transform 1s ease-out, box-shadow 1s ease-out;

        /* iOS key shadow (the "chin") */
        box-shadow: 0 1px 0 #898c94;
    }

    /* Extend touch target to cover gaps between keys */
    #hop-keyboard .key::before {
        content: '';
        position: absolute;
        top: calc(-1 * var(--hop-key-margin));
        left: calc(-1 * var(--hop-key-margin));
        right: calc(-1 * var(--hop-key-margin));
        bottom: calc(-1 * var(--hop-key-margin) - var(--hop-row-gap) / 2);
    }

    /* Pressed state - more prominent for mobile */
    #hop-keyboard .key.pressed {
        background: #d0d0d0 !important;
        box-shadow: none !important;
        /* Don't scale! Shrinking the element shrinks the touch target (::before), causing dropped keys on rapid taps */
        transform: translateY(3px);
        filter: brightness(0.85);
        transition: background-color 50ms, transform 50ms, box-shadow 50ms;
    }

    /* Function keys - darker background */
    #hop-keyboard .key.act {
        background: #b2b6bf;
        font-size: var(--hop-fn-font);
        font-weight: 400;
        letter-spacing: -0.2px;
    }

    /* Bottom row keys need larger font */
    #hop-keyboard .key.act[style*="fontSize"],
    #hop-keyboard .key.pri[style*="fontSize"],
    #hop-keyboard .key[style*="fontSize"] {
        font-size: inherit !important;
    }

    /* Bottom row large buttons (match function keys size) */
    #hop-keyboard .key.bottom {
        font-size: calc(16px * var(--hop-kb-scale)) !important;
    }

    #hop-keyboard .key.act.pressed {
        background: #aeb3bc !important;
    }

    /* Primary key (return) - iOS blue */
    #hop-keyboard .key.pri {
        background: #007aff;
    }

    #hop-keyboard .key.pri.pressed {
        background: #0062cc !important;
    }

    /* Active state (modifier on) - dark */
    #hop-keyboard .key.on {
        background: #000;
        color: #fff;
        box-shadow: none;
        transform: translateY(1px);
    }

    #hop-keyboard .key svg {
        width: var(--hop-icon-size);
        height: var(--hop-icon-size);
    }

    #hop-float-controls {
        position: fixed;
        top: calc(6px + env(safe-area-inset-top) + 20px);
        right: max(6px, env(safe-area-inset-right));
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 4px 6px;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.85);
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.12);
        backdrop-filter: blur(6px);
        z-index: 1000000;
        transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    #hop-float-controls svg {
        width: var(--hop-foot-icon);
        height: var(--hop-foot-icon);
        cursor: pointer;
    }

    #hop-float-controls .menu-trigger {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2px;
    }

    #hop-menu {
        display: none;
        flex-direction: column;
        gap: 2px;
        padding: 4px 0;
        border-top: 1px solid rgba(0, 0, 0, 0.1);
        margin-top: 4px;
    }

    #hop-float-controls.menu-open {
        flex-direction: column;
        padding: 8px 10px;
        max-width: calc(100vw - 24px);
    }

    #hop-float-controls.menu-open #hop-menu {
        display: flex;
    }

    #hop-float-controls,
    #hop-float-controls * {
        touch-action: none;
    }

    #hop-menu .menu-item {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 18px 20px;
        border-radius: 12px;
        font-size: 19px;
        font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
        color: #333;
        cursor: pointer;
        white-space: nowrap;
        transition: background-color 0.15s;
        min-height: 56px;
        box-sizing: border-box;
    }

    #hop-menu .menu-item:active {
        background: rgba(0, 0, 0, 0.12);
    }

    #hop-menu .menu-item svg {
        width: 28px;
        height: 28px;
        flex-shrink: 0;
    }

    #hop-menu .menu-divider {
        height: 1px;
        background: rgba(0, 0, 0, 0.1);
        margin: 4px 0;
    }

    #hop-menu .sessions-list {
        max-height: 250px;
        overflow-y: auto;
        margin: 0 -4px;
        padding: 0 4px;
    }

    #hop-menu .session-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 16px 20px;
        border-radius: 10px;
        font-size: 18px;
        color: #555;
        cursor: pointer;
        min-height: 52px;
        box-sizing: border-box;
    }

    #hop-menu .session-item:active {
        background: rgba(0, 0, 0, 0.1);
    }

    #hop-menu .session-item.current {
        background: rgba(0, 122, 255, 0.12);
        color: #007aff;
    }

    #hop-menu .session-item .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #34c759;
        flex-shrink: 0;
    }

    @media (orientation: landscape) {
        #hop-keyboard {
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
        }

        #hop-keyboard .acc-row {
            margin-left: 0;
            margin-right: 0;
            border-radius: 0;
        }
    }

    :root {
        --hop-kb-height: 280px;
        --hop-vh: 100vh;
        --hop-kb-scale: 1;
        --hop-key-height: calc(46px * var(--hop-kb-scale));
        --hop-key-margin: calc(3.024px * var(--hop-kb-scale));
        --hop-row-gap: calc(5.4px * var(--hop-kb-scale));
        --hop-acc-pad: calc(3.6px * var(--hop-kb-scale));
        --hop-acc-pad-bottom: calc(5.4px * var(--hop-kb-scale));
        --hop-acc-margin-bottom: calc(5.04px * var(--hop-kb-scale));
        --hop-acc-key-height: calc(36px * var(--hop-kb-scale));
        --hop-acc-font: calc(14px * var(--hop-kb-scale));
        --hop-key-font: calc(25px * var(--hop-kb-scale));
        --hop-fn-font: calc(16px * var(--hop-kb-scale));
        --hop-foot-pad-y: calc(14px * var(--hop-kb-scale));
        --hop-foot-pad-x: calc(24px * var(--hop-kb-scale));
        --hop-icon-size: calc(24px * var(--hop-kb-scale));
        --hop-foot-icon: calc(26px * var(--hop-kb-scale));
        --hop-foot-font: calc(12px * var(--hop-kb-scale));
        --hop-pill-font: calc(11px * var(--hop-kb-scale));
        --hop-kb-buffer: calc(5.4px * var(--hop-kb-scale));
        --hop-kb-extra: 0px;
    }

    /* ========================================
       SIMPLE LAYOUT: Fixed keyboard at bottom
       Body has padding-bottom to make space
       ======================================== */

    html,
    body {
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #000;
        overscroll-behavior: none;
    }

    body {
        /* Padding at bottom makes room for keyboard */
        padding-bottom: var(--hop-kb-height, 280px) !important;
        box-sizing: border-box;
    }

    /* Terminal takes full height minus keyboard */
    #terminal,
    .terminal {
        position: absolute !important;
        top: 0 !important;
        left: 0 !important;
        right: 0 !important;
        bottom: var(--hop-kb-height, 280px) !important;
        height: auto !important;
        overflow: hidden;
    }

    .xterm {
        height: 100% !important;
        width: 100% !important;
    }

    /* Keyboard fixed at bottom */
    #hop-keyboard {
        position: fixed !important;
        bottom: 0 !important;
        left: 0 !important;
        right: 0 !important;
        z-index: 99999;
    }



    /* System keyboard hint overlay */
    .sys-kb-hint-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: 999998;
        pointer-events: none;
        opacity: 0;
        animation: overlayFadeIn 0.4s ease-out forwards;
    }

    @keyframes overlayFadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    @keyframes overlayFadeOut {
        from { opacity: 1; }
        to { opacity: 0; }
    }

    .sys-kb-hint-overlay.fade-out {
        animation: overlayFadeOut 0.3s ease-out forwards;
    }

    /* System keyboard hint for first-time users */
    .sys-kb-hint {
        position: fixed;
        bottom: auto;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(0, 0, 0, 0.92);
        color: #fff;
        padding: 28px 36px;
        border-radius: 20px;
        font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
        font-size: 22px;
        text-align: center;
        line-height: 1.5;
        max-width: 340px;
        pointer-events: none;
        opacity: 0;
        animation: hintFadeIn 0.4s ease-out forwards;
        z-index: 999999;
        box-shadow: 0 12px 48px rgba(0, 0, 0, 0.4);
    }

    @keyframes hintFadeIn {
        from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
        to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    }

    @keyframes hintFadeOut {
        from { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        to { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
    }

    .sys-kb-hint.fade-out {
        animation: hintFadeOut 0.3s ease-out forwards;
    }

    @keyframes pulseStrong {
        0%, 100% {
            box-shadow: 0 0 0 0 rgba(0, 122, 255, 0.7);
            transform: scale(1);
            background: #007aff;
        }
        50% {
            box-shadow: 0 0 0 12px rgba(0, 122, 255, 0);
            transform: scale(1.1);
            background: #0066dd;
        }
    }

    .sys-kb-pulse {
        animation: pulseStrong 1s ease-in-out 5;
        border-radius: 8px;
        color: #fff !important;
    }

    .sys-kb-pulse svg {
        stroke: #fff !important;
    }

    /* System keyboard button - permanently highlighted */
    .sys-kb-btn {
        background: #3b82f6 !important;
        color: #fff !important;
    }

    .sys-kb-btn svg {
        stroke: #fff !important;
    }

    #hop-sys-dialog {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        /* Use safe area to avoid being covered by bars if needed, but fixed usually ignores safe area unless specified */
        max-width: none;
        max-height: none;
        margin: 0;
        padding: 0;
        border: none;
        background: transparent;
        z-index: 1000000;
        display: none;
    }

    #hop-sys-dialog[open] {
        display: block;
    }

    #hop-sys-dialog::backdrop {
        background: rgba(0, 0, 0, 0.5);
    }

    #hop-sys-dialog-content {
        position: absolute;
        top: calc(env(safe-area-inset-top) + 12px);
        left: 12px;
        right: 12px;
        bottom: auto;
        width: auto;

        background: rgba(245, 245, 247, 0.9);
        backdrop-filter: blur(25px);
        -webkit-backdrop-filter: blur(25px);

        padding: 10px;
        border-radius: 24px;

        display: flex;
        gap: 8px;

        border: 1px solid rgba(255, 255, 255, 0.5);
        box-shadow:
            0 12px 40px rgba(0, 0, 0, 0.2),
            0 2px 8px rgba(0, 0, 0, 0.05);

        transition: transform 0.35s cubic-bezier(0.19, 1, 0.22, 1);
        transform: translateY(calc(-100% - 60px));
        z-index: 10000;
    }

    #hop-sys-dialog[open] #hop-sys-dialog-content {
        transform: translateY(0);
    }

    #hop-sys-input {
        flex: 1;
        height: 64px;
        border-radius: 16px;
        border: none;
        box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.06);
        padding: 0 16px;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
        font-size: 40px;
        background: #ffffff;
        -webkit-text-size-adjust: 100%;
        color: #000;
    }

    #hop-sys-input:focus {
        outline: none;
        box-shadow: 0 0 0 2px #007aff, 0 4px 12px rgba(0, 122, 255, 0.25);
    }
</style>


<div id="hop-float-controls">
    <div id="hop-menu-trigger" class="menu-trigger" style="cursor:pointer;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">

    </div>

<script>
    (function () {


        // Get socket from head hook (window.__hopSocket)
        function getSocket() {
            return window.__hopSocket;
        }

        function isSocketOpen() {
            var s = getSocket();
            return !!(s && s.readyState === 1);
        }

        var hopOnData = null;
        var hopPrimed = false;
        var hopPrimedAt = 0;

        function hapticTap() {
            try {
                if (!navigator.vibrate) return;
                var ua = navigator.userAgent || '';
                if (/iPad|iPhone|iPod/.test(ua)) return;
                navigator.vibrate(10);
            } catch (e) { }
        }
        function getOnData() {
            return (typeof window.__hopOnData === 'function') ? window.__hopOnData : hopOnData;
        }
        function hookTermInstance(term) {
            if (!term) return;

            // Try to find existing onData callback from xterm internals
            if (!window.__hopOnData && !hopOnData) {
                try {
                    // xterm.js stores onData listeners in _core._onData
                    if (term._core && term._core._onData && term._core._onData._listeners) {
                        var listeners = term._core._onData._listeners;
                        if (listeners.length > 0) {
                            var cb = listeners[0];
                            if (typeof cb === 'function') {
                                hopOnData = cb;
                                window.__hopOnData = cb;
                                window.__hopTerm = term;
                            }
                        }
                    }
                } catch (e) { }
            }

            // Patch onData for future calls
            if (!term.__hopPatched && typeof term.onData === 'function') {
                var orig = term.onData;
                term.onData = function (cb) {
                    hopOnData = cb;
                    window.__hopOnData = cb;
                    window.__hopTerm = term;
                    return orig.call(term, cb);
                };
                term.__hopPatched = true;
            }
        }
        function findTerminalInstance() {
            var candidates = [
                window.__hopTerm,
                window.term,
                window.terminal,
                window.xterm,
                window.ttydTerm,
                window.ttydTerminal
            ];
            for (var i = 0; i < candidates.length; i++) {
                var t = candidates[i];
                if (t && typeof t.onData === 'function') return t;
            }
            // Shallow scan window for a Terminal-like object
            try {
                for (var k in window) {
                    var v = window[k];
                    if (!v || typeof v.onData !== 'function') continue;
                    if (v.element && v.element.classList && v.element.classList.contains('terminal')) return v;
                    if (v._core || v._coreService) return v;
                }
            } catch (e) { }
            return null;
        }
        function hookTerminalOnData() {
            if (!window.Terminal || window.Terminal.__hopPatched) return;
            var Terminal = window.Terminal;
            var orig = Terminal.prototype.onData;
            if (typeof orig !== 'function') return;
            Terminal.prototype.onData = function (cb) {
                hopOnData = cb;
                window.__hopOnData = cb;
                window.__hopTerm = this;
                return orig.call(this, cb);
            };
            Terminal.__hopPatched = true;
            Terminal.__hopPatched = true;
        }
        function sendViaCore(term, data) {
            if (!term) return false;
            try {
                if (term._core && term._core._onData && typeof term._core._onData.fire === 'function') {
                    term._core._onData.fire(data);
                    return true;
                }
                if (term._coreService && typeof term._coreService.triggerDataEvent === 'function') {
                    term._coreService.triggerDataEvent(data, true);
                    return true;
                }
                if (term.coreService && typeof term.coreService.triggerDataEvent === 'function') {
                    term.coreService.triggerDataEvent(data, true);
                    return true;
                }
            } catch (e) { }
            return false;
        }

        function sendViaCoreFast(data) {
            // Use cached terminal instance first for speed
            var term = window.__hopTerm || findTerminalInstance();
            if (!term) return false;
            if (!window.__hopTerm) {
                window.__hopTerm = term;
                hookTermInstance(term);
            }
            return sendViaCore(term, data);
        }





        function updateKbHeight() {
            // If system keyboard dialog is open, FREEZE the layout.
            // Do not update scale or resize terminal.
            if (document.body.classList.contains('sys-kb-open')) return;

            updateKbScale();
            updateViewportHeight();
            var kb = document.getElementById('hop-keyboard');
            if (!kb) return;
            if (kb.style.display === 'none') {
                document.documentElement.style.setProperty('--hop-kb-height', '0px');
                fitTerminal();
                return;
            }
            var rect = kb.getBoundingClientRect();
            var h = rect && rect.height ? rect.height : kb.offsetHeight;
            if (h) {
                var buffer = 0;
                var extra = 0;
                try {
                    var bufStr = getComputedStyle(document.documentElement).getPropertyValue('--hop-kb-buffer');
                    buffer = parseFloat(bufStr) || 0;
                    var extraStr = getComputedStyle(document.documentElement).getPropertyValue('--hop-kb-extra');
                    extra = parseFloat(extraStr) || 0;
                } catch (e) { }
                if (typeof window.__hopKbExtra === 'number') extra += window.__hopKbExtra;
                document.documentElement.style.setProperty('--hop-kb-height', (h + buffer + extra) + 'px');
                fitTerminal();
            }
        }

        // Trigger xterm to recalculate its dimensions
        function fitTerminal() {
            // If system keyboard dialog is open, FREEZE the layout.
            if (document.body.classList.contains('sys-kb-open')) return;

            // Small delay to allow CSS to apply
            setTimeout(function () {
                // Try various ways to trigger xterm fit
                var term = findTerminalInstance();
                if (term) {
                    // xterm.js fit addon
                    if (term._addonManager && term._addonManager._addons) {
                        for (var i = 0; i < term._addonManager._addons.length; i++) {
                            var addon = term._addonManager._addons[i];
                            if (addon.instance && typeof addon.instance.fit === 'function') {
                                try { addon.instance.fit(); } catch (e) { }
                            }
                        }
                    }
                    // Direct fit method (if FitAddon is attached)
                    if (typeof term.fit === 'function') {
                        try { term.fit(); } catch (e) { }
                    }
                    // Force resize event
                    if (term._core && term._core._renderService) {
                        try { term._core._renderService.onResize(term.cols, term.rows); } catch (e) { }
                    }
                }
                // Also trigger window resize to help other listeners
                try {
                    window.dispatchEvent(new Event('resize'));
                } catch (e) { }
            }, 50);
        }

        function clamp(num, min, max) {
            return Math.max(min, Math.min(max, num));
        }

                                    var empty = document.createElement('div');
                                    empty.className = 'session-item';
                                    empty.style.color = '#999';
                                    empty.textContent = 'No sessions';
                                    sessionsList.appendChild(empty);
                                    return;
                                }

                                allSessions.forEach(function (s) {
                                    var sessionName = s.name;
                                    var displayName = s.displayName || sessionName;
                                    var item = document.createElement('div');
                                    item.className = 'session-item';
                                    if (sessionName === currentSession) {
                                        item.classList.add('current');
                                    }

                                    var isActive = activeNames.indexOf(sessionName) !== -1;
                                    if (isActive) {
                                        var dot = document.createElement('span');
                                        dot.className = 'dot';
                                        item.appendChild(dot);
                                    }

                                    var nameSpan = document.createElement('span');
                                    nameSpan.textContent = displayName;
                                    item.appendChild(nameSpan);

                                    item.addEventListener('click', function (e) {
                                        e.stopPropagation();
                                        if (sessionName !== currentSession) {
                                            window.location.href = '/?session=' + encodeURIComponent(sessionName);
                                        }
                                        closeMenu();
                                    });

                                    sessionsList.appendChild(item);
                                });
                            })
                            .catch(function (err) {
                                sessionsList.innerHTML = '<div class="session-item" style="color:#999">Failed to load</div>';
                            });
                    }

                    var savedPosition = null;

                    function openMenu() {
                        menuOpen = true;

                        // Save current position before adjusting
                        savedPosition = {
                            left: fab.style.left,
                            top: fab.style.top
                        };

                        fab.classList.add('menu-open');
                        fetchSessions();

                        // Adjust position to stay within viewport
                        setTimeout(function() {
                            var rect = fab.getBoundingClientRect();
                            var winW = window.innerWidth;
                            var winH = window.innerHeight;

                            // Check right overflow
                            if (rect.right > winW - 10) {
                                fab.style.left = Math.max(10, winW - rect.width - 10) + 'px';
                            }
                            // Check bottom overflow
                            if (rect.bottom > winH - 10) {
                                fab.style.top = Math.max(10, winH - rect.height - 10) + 'px';
                            }
                        }, 10);
                    }

                    function closeMenu() {
                        menuOpen = false;
                        fab.classList.remove('menu-open');

                        // Restore original position
                        if (savedPosition) {
                            fab.style.left = savedPosition.left;
                            fab.style.top = savedPosition.top;
                            savedPosition = null;
                        }
                    }

                    function toggleMenu() {
                        if (menuOpen) {
                            closeMenu();
                        } else {
                            openMenu();
                        }
                    }

                    // Toggle keyboard button
                    if (toggleKbBtn) {
                        toggleKbBtn.addEventListener('click', function (e) {
                            e.stopPropagation();
                            self.toggle();
                            closeMenu();
                        });
                    }

                    // All sessions button - go to session picker
                    if (allSessionsBtn) {
                        allSessionsBtn.addEventListener('click', function (e) {
                            e.stopPropagation();
                            window.location.href = '/';
                        });
                    }

                    // Close menu when clicking outside
                    document.addEventListener('click', function (e) {
                        if (menuOpen && !fab.contains(e.target)) {
                            closeMenu();
                        }
                    });

                    // Draggable handling - only for the trigger icon, not the whole menu
                    var triggerActive = false;

                    function onTriggerStart(e) {
                        e.preventDefault();
                        e.stopPropagation();

                        var touch = e.touches ? e.touches[0] : e;
                        startX = touch.clientX;
                        startY = touch.clientY;

                        var rect = fab.getBoundingClientRect();
                        initialLeft = rect.left;
                        initialTop = rect.top;

                        fab.style.right = 'auto';
                        fab.style.bottom = 'auto';
                        fab.style.left = initialLeft + 'px';
                        fab.style.top = initialTop + 'px';

                        triggerActive = true;
                        isDragging = true;
                        hasMoved = false;
                        fab.style.transition = 'none';
                    }

                    function onMove(e) {
                        if (!isDragging || !triggerActive) return;
                        e.preventDefault();
                        var touch = e.touches ? e.touches[0] : e;
                        var dx = touch.clientX - startX;
                        var dy = touch.clientY - startY;

                        if (Math.abs(dx) > 5 || Math.abs(dy) > 5) {
                            hasMoved = true;
                        }

                        fab.style.left = (initialLeft + dx) + 'px';
                        fab.style.top = (initialTop + dy) + 'px';
                    }

                    function onEnd(e) {
                        if (!triggerActive) return;
                        triggerActive = false;
                        isDragging = false;
                        fab.style.transition = 'all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1)';

                        var rect = fab.getBoundingClientRect();
                        var winW = window.innerWidth;
                        var winH = window.innerHeight;
                        var safeTop = 10;
                        var safeBottom = winH - 50;
                        var safeLeft = 10;
                        var safeRight = winW - 50;

                        var newTop = Math.max(safeTop, Math.min(safeBottom, rect.top));
                        var newLeft = Math.max(safeLeft, Math.min(safeRight, rect.left));

                        fab.style.top = newTop + 'px';
                        fab.style.left = newLeft + 'px';
                        fab.style.right = 'auto';

                        // If it wasn't a drag (just a tap), toggle the menu
                        if (!hasMoved) {
                            toggleMenu();
                        }
                    }

                    menuTrigger.addEventListener('touchstart', onTriggerStart, { passive: false });
                    menuTrigger.addEventListener('touchmove', onMove, { passive: false });
                    menuTrigger.addEventListener('touchend', onEnd, { passive: false });

                    menuTrigger.addEventListener('mousedown', onTriggerStart);
                    document.addEventListener('mousemove', onMove);
                    document.addEventListener('mouseup', onEnd);
                })();

                // Wait for socket and update status
                var checkSocket = setInterval(function () {
                    hookTerminalOnData();
                    var t = findTerminalInstance();
                    if (t) hookTermInstance(t);
                    var socket = getSocket();
                    if (socket) {
                        if (socket.readyState === 1) {
                            clearInterval(checkSocket);
                        }
                    } else {

                    }
                }, 500);

                window.addEventListener('resize', function () { updateKbHeight(); });
                if (window.visualViewport) {
                    window.visualViewport.addEventListener('resize', function () { updateKbHeight(); });
                }
                window.addEventListener('orientationchange', function () { setTimeout(updateKbHeight, 50); });
            }
        };

        // Initialize when ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', function () { hopKb.init(); });
        } else {
            hopKb.init();
        }
    })();
</script>
